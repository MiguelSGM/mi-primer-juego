<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Hangman: Fight Club</title>
    <style>
        /* Estilos visuales del juego */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #ff4757;
            margin-bottom: 10px;
        }

        .category {
            font-style: italic;
            color: #a4b0be;
            margin-bottom: 30px;
        }

        #word-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 5px;
        }

        .letter-space {
            border-bottom: 4px solid #ffffff;
            width: 30px;
            text-align: center;
            min-height: 40px;
        }

        .space {
            width: 20px;
            border-bottom: none;
        }

        #guesses-left {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #ffa502;
        }

        #keyboard {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            max-width: 600px;
            width: 100%;
        }

        button {
            background-color: #2f3542;
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover:not(:disabled) {
            background-color: #57606f;
        }

        button:disabled {
            background-color: #747d8c;
            color: #a4b0be;
            cursor: not-allowed;
        }

        #message {
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 20px;
            height: 30px;
        }

        .win { color: #2ed573; }
        .lose { color: #ff4757; }

        #reset-btn {
            margin-top: 20px;
            background-color: #ff4757;
            padding: 10px 20px;
            display: none;
        }
    </style>
</head>
<body>

    <h1>Movie Hangman</h1>
    <div class="category">Categoría: Película (Título en inglés)</div>

    <!-- Contenedor donde se mostrarán las letras ocultas -->
    <div id="word-container"></div>

    <!-- Contador de vidas -->
    <div id="guesses-left">Intentos restantes: <span id="lives">6</span></div>

    <!-- Teclado virtual -->
    <div id="keyboard"></div>

    <!-- Mensaje de resultado (Ganar/Perder) -->
    <div id="message"></div>

    <!-- Botón para reiniciar la partida -->
    <button id="reset-btn" onclick="initGame()">Jugar de nuevo</button>

    <script>
        // Lógica del juego en JavaScript
        const movie = "FIGHT CLUB";
        let guessedLetters = [];
        let lives = 6;

        const wordContainer = document.getElementById('word-container');
        const keyboardContainer = document.getElementById('keyboard');
        const livesDisplay = document.getElementById('lives');
        const messageDisplay = document.getElementById('message');
        const resetBtn = document.getElementById('reset-btn');

        // Inicializar o reiniciar el juego
        function initGame() {
            guessedLetters = [];
            lives = 6;
            messageDisplay.textContent = "";
            messageDisplay.className = "";
            resetBtn.style.display = "none";
            livesDisplay.textContent = lives;
            
            renderWord();
            renderKeyboard();
        }

        // Dibujar los espacios de la película en la pantalla
        function renderWord() {
            wordContainer.innerHTML = "";
            for (let char of movie) {
                const charElement = document.createElement('div');
                if (char === " ") {
                    charElement.className = "space";
                } else {
                    charElement.className = "letter-space";
                    // Si la letra ha sido adivinada, la muestra; si no, queda vacía
                    if (guessedLetters.includes(char)) {
                        charElement.textContent = char;
                    }
                }
                wordContainer.appendChild(charElement);
            }
        }

        // Dibujar el teclado de la A a la Z
        function renderKeyboard() {
            keyboardContainer.innerHTML = "";
            const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            
            for (let letter of alphabet) {
                const button = document.createElement('button');
                button.textContent = letter;
                button.addEventListener('click', () => handleGuess(letter, button));
                keyboardContainer.appendChild(button);
            }
        }

        // Manejar la pulsación de una letra
        function handleGuess(letter, button) {
            button.disabled = true; // Deshabilitar botón para no pulsar la misma letra
            
            if (movie.includes(letter)) {
                guessedLetters.push(letter);
                renderWord();
                checkWin();
            } else {
                lives--;
                livesDisplay.textContent = lives;
                checkLose();
            }
        }

        // Comprobar si el jugador ha ganado
        function checkWin() {
            // Quita los espacios y comprueba si todas las letras de la película están en las adivinadas
            const movieLetters = movie.replace(/\s/g, '').split('');
            const hasWon = movieLetters.every(letter => guessedLetters.includes(letter));
            
            if (hasWon) {
                messageDisplay.textContent = "¡Has ganado! 🎬";
                messageDisplay.className = "win";
                disableAllButtons();
                resetBtn.style.display = "block";
            }
        }

        // Comprobar si el jugador ha perdido
        function checkLose() {
            if (lives <= 0) {
                messageDisplay.textContent = `Game Over. La película era: ${movie}`;
                messageDisplay.className = "lose";
                disableAllButtons();
                resetBtn.style.display = "block";
                
                // Revelar la palabra correcta al perder
                guessedLetters = movie.split('');
                renderWord();
            }
        }

        // Deshabilitar todo el teclado al terminar la partida
        function disableAllButtons() {
            const buttons = keyboardContainer.querySelectorAll('button');
            buttons.forEach(btn => btn.disabled = true);
        }

        // Arrancar el juego por primera vez al cargar la página
        initGame();
    </script>
</body>
</html>
